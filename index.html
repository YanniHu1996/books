<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --fg: #0a0a0a;
            --muted: #737373;
            --accent: #dc2626;
            --card: #ffffff;
            --border: #e5e5e5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--fg);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 64px 24px;
        }

        header {
            margin-bottom: 48px;
        }

        .tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(220, 38, 38, 0.08);
            padding: 4px 10px;
            border-radius: 4px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .desc {
            color: var(--muted);
            font-size: 15px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 32px 0;
        }

        .book-list {
            display: flex;
            flex-direction: column;
        }

        .book-item {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: inherit;
            transition: opacity 0.2s;
        }

        .book-item:last-child {
            border-bottom: none;
        }

        .book-item:hover {
            opacity: 0.6;
        }

        .book-info {
            flex: 1;
            min-width: 0;
        }

        .book-title {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .book-meta {
            font-size: 13px;
            color: var(--muted);
        }

        .download-icon {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            color: var(--muted);
            margin-top: 2px;
        }

        footer {
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .stats {
            display: flex;
            gap: 32px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            .container {
                padding: 32px 16px;
            }

            h1 {
                font-size: 24px;
            }

            .stats {
                gap: 24px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="tag">Collection</span>
            <h1>投资书籍</h1>
            <p class="desc">价值投资经典读物，持续更新</p>
        </header>

        <div class="divider"></div>

        <main class="book-list" id="bookList"></main>

        <footer>
            <div class="stats">
                <div class="stat">
                    <span class="stat-value" id="count">0</span>
                    <span class="stat-label">册</span>
                </div>
                <div class="stat">
                    <span class="stat-value">PDF</span>
                    <span class="stat-label">格式</span>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const books = [
            { file: "投资中不简单的事_邱国鹭_中国纺织_2018.1.pdf", author: "邱国鹭" },
            { file: "《沃伦·巴菲特：终极金钱心智》罗伯特·哈格斯特朗【文字版_PDF电子书_雅书】 (1).pdf", author: "罗伯特·哈格斯特朗" },
            { file: "《巴菲特幕后智囊：查理·芒格传【股神巴菲特作序推荐，芒格本人及巴菲特亲自授权，价值投资和提升思维能力的必读经典！】》珍妮特·洛尔【文字版_PDF电子书_下载】.pdf", author: "珍妮特·洛尔" },
            { file: "《投资的本质：段永平讲述投资的底层逻辑》孙力科【文字版_PDF电子书_雅书】.pdf", author: "孙力科" },
            { file: "《文明、现代化、价值投资与中国（增订版）》李录【文字版_PDF电子书_雅书】.pdf", author: "李录" },
            { file: "《查理·芒格致股东的信》李永宁【文字版_PDF电子书_下载】.pdf", author: "李永宁" },
            { file: "《段永平投资问答录：大道至简的财富逻辑》马小奔【文字版_PDF电子书_雅书】.pdf", author: "马小奔" },
            { file: "《沃伦·巴菲特：终极金钱心智》罗伯特·哈格斯特朗【文字版_PDF电子书_雅书】.pdf", author: "罗伯特·哈格斯特朗" },
            { file: "一本书读懂财报（清华会计系主任肖星课程，秒通财报，从本书开始）.pdf", author: "肖星" },
            { file: "大道：段永平投资问答录.pdf", author: "段永平" },
            { file: "投资中最简单的事.pdf", author: "邱国鹭" },
            { file: "周期+-+霍华德·马克斯.pdf", author: "霍华德·马克斯" },
            { file: "巴菲特致股东的信：投资原则篇（巴菲特亲荐，但斌倾情做序，揭示贯穿巴菲特整个投资生涯、多年长盛不衰的基本原则）+-+杰里米·米勒.pdf", author: "杰里米·米勒" },
            { file: "《价值投资者的财报分析》夏立军+&+李莫愁【文字版_PDF电子书_下载】.pdf", author: "夏立军、李莫愁" },
            { file: "《一个投机者的告白·实战版（集结大师智慧精髓，详解实战案例，德国\u201c股神\u201d、欧洲的沃伦·巴菲特、20世纪股市见证人科斯托拉尼投资法实战全解析）》安纳金【文字版_PDF电子.pdf", author: "安纳金" },
            { file: "《慢慢变富2：普通人的成功投资》闲来一坐s话投资【文字版_PDF电子书_雅书】.pdf", author: "闲来一坐s话投资" },
            { file: "《价值投资3.0：数字经济时代如何寻找百倍成长股》亚当·西塞尔【文字版_PDF电子书_雅书】.pdf", author: "亚当·西塞尔" },
            { file: "《雪球名家带你价值投资（套装共6册）》张延昆+&+任俊杰+&+朱晓芸+&+杨旭然+&+常宏+&+望京博格+&+静逸投资【文字版_PDF电子书_下载】.pdf", author: "张延昆 等" }
        ];

        function cleanTitle(filename) {
            return filename
                .replace('【文字版_PDF电子书_雅书】', '')
                .replace('【文字版_PDF电子书_下载】', '')
                .replace('【文字版_PDF电子.pdf', '')
                .replace('.pdf', '')
                .replace(/《.*?》/g, '')
                .replace(/^[\s\-:：]+|[\s\-:：]+$/g, '')
                .trim();
        }

        const bookList = document.getElementById('bookList');
        const countSpan = document.getElementById('count');

        books.forEach(book => {
            const item = document.createElement('a');
            item.className = 'book-item';
            item.href = encodeURIComponent(book.file);
            item.download = '';
            item.innerHTML = `
                <div class="book-info">
                    <div class="book-title">${cleanTitle(book.file)}</div>
                    <div class="book-meta">${book.author}</div>
                </div>
                <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
            `;
            bookList.appendChild(item);
        });

        countSpan.textContent = books.length;
    </script>
</body>
</html>
